<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#5b21b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>SMART MATH × RARA — Gold Edition 3.0</title>
<style>
:root{
 --purple:#6d28d9;--purple2:#3b116e;--pink:#ec4899;--gold:#fbbf24;
 --green:#52c94f;--blue:#38bdf8;--ink:#43205f;--white:#fff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:ui-rounded,"Arial Rounded MT Bold",system-ui,sans-serif;background:#251047;color:var(--ink)}
button,input{font:inherit}button{border:0;cursor:pointer;touch-action:manipulation}button:active{transform:scale(.97)}
.app{max-width:760px;min-height:100vh;margin:auto;position:relative;overflow:hidden;background:
radial-gradient(circle at 14% 11%,#ffffff55 0 3%,transparent 4%),
radial-gradient(circle at 87% 23%,#ffffff44 0 2%,transparent 3%),
linear-gradient(180deg,#4d1889 0,#b64eb9 30%,#71d1ff 66%,#75d16a 100%);padding-bottom:78px}
.topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#4c1d95ed;color:#fff;border-radius:0 0 22px 22px;box-shadow:0 8px 18px #28104966}
.brand{font-weight:1000;font-size:14px;letter-spacing:.3px}.stats{display:flex;gap:6px}.pill{padding:7px 10px;border-radius:999px;background:#ffffff20;border:2px solid #ffffff3d;font-weight:1000}
.screen{display:none;min-height:calc(100vh - 78px);padding:10px}.screen.active{display:block}
.card{background:linear-gradient(180deg,#fffffff2,#fff8ffeb);border:3px solid #ffffffba;border-radius:29px;padding:15px;box-shadow:0 14px 28px #35106445;margin-top:10px;position:relative}
.logo{text-align:center;font-weight:1000;font-size:clamp(34px,10vw,58px);line-height:.86;color:#6ed548;text-shadow:0 4px 0 #fff,0 7px 0 #673295;letter-spacing:-2px}
.logo span{display:block;color:#f356a4;font-size:.5em;margin-top:11px;text-shadow:0 3px 0 #fff,0 5px 0 #762869}
.edition{display:block;width:max-content;margin:12px auto 5px;padding:7px 16px;border-radius:999px;background:linear-gradient(#fff0a7,#e5a315);color:#6f3a00;font-size:13px;font-weight:1000;box-shadow:0 4px 0 #a76c08}
.speech{background:#fff;border:3px solid #f3b1df;border-radius:21px;padding:11px;text-align:center;font-size:19px;font-weight:1000;color:#77266f;box-shadow:0 6px 0 #d788c3;margin:6px auto 14px}
.avatar-display{display:flex;justify-content:center;align-items:end;min-height:275px}
.avatar-svg{width:min(82%,310px);filter:drop-shadow(0 14px 8px #4d246344);animation:float 3s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-6px)}}
.wave{transform-origin:302px 213px;animation:wave 1.3s ease-in-out infinite}@keyframes wave{50%{transform:rotate(-13deg)}}
.primary{width:100%;min-height:62px;border-radius:21px;background:linear-gradient(#75dd69,#43af49);color:#fff;font-size:20px;font-weight:1000;box-shadow:0 7px 0 #278436;margin:12px 0}
.secondary{padding:11px 15px;border-radius:16px;background:#6d28d9;color:#fff;font-weight:1000;box-shadow:0 4px 0 #45158c}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{min-height:110px;border-radius:23px;padding:12px;color:#fff;font-weight:1000;box-shadow:0 7px 0 #0002;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:16px}.tile b{font-size:40px}
.purple{background:#8b5cf6}.pink{background:#ec4899}.orange{background:#f59e0b}.blue{background:#0ea5e9}.green{background:#49bd58}.red{background:#ef4444}
.headrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.headrow h2{margin:0;text-align:center;flex:1}
.gamebox{background:#fff;border-radius:25px;padding:13px;min-height:420px;box-shadow:0 10px 24px #3f1a6d33;position:relative;overflow:hidden}
.instruction{text-align:center;background:#f4e7ff;border-radius:18px;padding:11px;font-size:18px;font-weight:1000;margin-bottom:11px}
.feedback{text-align:center;min-height:31px;font-weight:1000;font-size:19px;margin-top:8px}
.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
.choice{min-height:62px;border-radius:17px;color:#fff;font-weight:1000;background:#6d28d9;box-shadow:0 5px 0 #43158a}
.avatar-panel{background:linear-gradient(180deg,#251257,#5e2399);border-radius:26px;padding:12px;color:#fff}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}.gender-btn{padding:12px;border-radius:17px;background:#ffffff17;color:#fff;border:3px solid transparent;font-weight:1000}.gender-btn.active{background:#f15ba5;border-color:#ffd65c}
.avatar-stage{background:linear-gradient(#8e55da,#f3a7dc 65%,#d8f7ff);border:3px solid #dba6ff;border-radius:24px;min-height:330px;display:flex;justify-content:center;align-items:end;overflow:hidden}
.tabs{display:flex;gap:7px;overflow:auto;padding:10px 0}.tab{white-space:nowrap;border-radius:999px;padding:9px 14px;background:#7c32b2;color:#fff;font-weight:900}.tab.active{background:#f59e0b;color:#5d2c00}
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.prof-card{background:#fff;color:#4e2365;border-radius:18px;padding:8px 5px;min-height:128px;position:relative;box-shadow:0 5px 0 #0002;font-weight:900}.prof-card.active{outline:4px solid #ffd34f}.mini-avatar{height:80px;display:flex;align-items:end;justify-content:center;overflow:hidden}.mini-avatar .avatar-svg{width:86px;animation:none;filter:none}.lock{position:absolute;right:5px;top:5px;background:#4b176f;color:#fff;border-radius:999px;padding:4px 7px;font-size:11px}.cost{font-size:12px;color:#8b4f00}
.avatar-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px}
.reward-box{text-align:center;background:linear-gradient(#d9f4ff,#fff4d1);border-radius:24px;padding:18px}.reward-avatar{height:210px;display:flex;justify-content:center;align-items:end}.reward-avatar .avatar-svg{width:190px}
.ice-stage{height:235px;display:flex;justify-content:center;align-items:end;position:relative;background:linear-gradient(#c3efff,#f4dcff);border-radius:21px;overflow:hidden}.cone{width:106px;height:135px;background:repeating-linear-gradient(45deg,#d89947 0 8px,#f2be70 8px 16px);clip-path:polygon(0 0,100% 0,50% 100%);position:absolute;bottom:18px}.scoop{width:115px;height:89px;border-radius:60% 60% 45% 45%;position:absolute;bottom:126px;background:#ffc0cb;border:5px solid #ffffffaa;box-shadow:0 8px 0 #0001}
.color-btn{height:60px;border:4px solid white;border-radius:17px;box-shadow:0 4px 0 #0003;color:white;font-weight:1000;text-shadow:0 2px 2px #0008}
.trace-area{height:300px;background:linear-gradient(#d8f6ff,#dcffd5);border-radius:21px;position:relative;touch-action:none;overflow:hidden}.trace-dot{position:absolute;width:19px;height:19px;border-radius:50%;background:#8b5cf6;border:3px solid white;transform:translate(-50%,-50%)}.bee{position:absolute;font-size:37px;transform:translate(-50%,-50%);pointer-events:none}.flower{position:absolute;right:13px;bottom:12px;font-size:60px}
.monkey-stage{height:375px;background:linear-gradient(#a7e7ff,#bde991);border-radius:21px;position:relative;overflow:hidden;touch-action:none}.monkey{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:70px}.banana{position:absolute;font-size:38px;top:-50px}.scorebig{text-align:center;font-size:20px;font-weight:1000}
.puzzle{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:350px;margin:10px auto;background:#582a8d;padding:7px;border-radius:18px}.piece{aspect-ratio:1;border-radius:11px;font-size:34px;font-weight:1000;background:linear-gradient(135deg,#ffd76a,#ff8db8);color:#5b216e;display:flex;align-items:center;justify-content:center}.piece.empty{background:#e9ddf5}
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:13px}.match-col{display:grid;gap:9px}.match-card{height:70px;border-radius:19px;background:#f2e8ff;border:4px solid transparent;font-size:40px;display:flex;align-items:center;justify-content:center}.match-card.selected{border-color:#f59e0b;background:#fff6c6}.match-card.done{opacity:.35}
.splash-board{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.splash-card{height:92px;border-radius:21px;border:5px solid white;box-shadow:0 5px 0 #0002;font-weight:1000;color:white;text-shadow:0 2px 2px #0008;font-size:18px}
.bottomnav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(760px,100%);height:74px;background:#4c1d95f3;z-index:50;display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -6px 20px #2d0b4d55}.bottomnav button{background:transparent;color:white;font-size:11px;font-weight:900}.bottomnav b{display:block;font-size:24px}
.toast{position:fixed;left:50%;top:18%;transform:translate(-50%,-20px);background:#fff;color:#5b216e;border-radius:20px;padding:14px 22px;font-weight:1000;font-size:19px;z-index:100;box-shadow:0 10px 30px #0004;opacity:0;pointer-events:none;transition:.25s;text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:430px){.screen{padding:8px}.card{padding:12px}.avatar-display{min-height:250px}.prof-grid{gap:7px}.prof-card{min-height:116px;font-size:13px}.mini-avatar{height:72px}.mini-avatar .avatar-svg{width:77px}.gamebox{padding:10px;min-height:405px}}
</style>
</head>
<body>
<div class="app">
 <div class="topbar"><div class="brand">⭐ SMART MATH × RARA</div><div class="stats"><div class="pill">🪙 <span id="coins">120</span></div><div class="pill">⭐ <span id="stars">0</span></div></div></div>

 <section id="home" class="screen active"><div class="card">
   <div class="logo">SMART MATH<span>× RARA</span></div><div class="edition">GOLD EDITION 3.0</div>
   <div class="avatar-display" id="homeAvatar"></div>
   <div class="speech" id="homeGreeting">Hi! Ready to learn and have fun?</div>
   <button class="primary" onclick="show('learn')">▶ START LEARNING</button>
   <div class="grid">
    <button class="tile purple" onclick="show('flash')"><b>🔢</b>Flashcards</button>
    <button class="tile orange" onclick="show('games')"><b>🎮</b>Mini Games</button>
    <button class="tile pink" onclick="show('avatar')"><b>👧👦</b>My Avatar</button>
    <button class="tile blue" onclick="dailyReward()"><b>🎁</b>Daily Reward</button>
   </div>
 </div></section>

 <section id="learn" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="show('home')">← Back</button><h2>Choose to Learn</h2><span></span></div><div class="grid">
  <button class="tile green" onclick="startQuiz('count')"><b>🍎</b>Counting</button><button class="tile blue" onclick="startQuiz('add')"><b>➕</b>Addition</button><button class="tile pink" onclick="startQuiz('sub')"><b>➖</b>Subtraction</button><button class="tile orange" onclick="startQuiz('shape')"><b>🔺</b>Shapes</button>
 </div></div></section>

 <section id="quiz" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="show('learn')">← Back</button><h2 id="quizTitle">Learning</h2><span></span></div>
  <div class="gamebox"><div style="height:125px;display:flex;justify-content:center;align-items:end" id="lessonAvatar"></div><div class="instruction" id="question"></div><div id="visual" style="text-align:center;font-size:46px;min-height:88px"></div><div id="answers" class="choice-grid"></div><div id="quizFeedback" class="feedback"></div></div>
 </div></section>

 <section id="flash" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="show('home')">← Back</button><h2>Number Flashcards</h2><span></span></div><div class="gamebox" style="display:flex;flex-direction:column;align-items:center;justify-content:center"><div id="flashNum" style="font-size:145px;font-weight:1000;color:#7c3aed">1</div><div id="flashObjects" style="font-size:37px">⭐</div><div style="display:flex;gap:9px;margin-top:26px"><button class="secondary" onclick="flashMove(-1)">←</button><button class="primary" style="width:155px;margin:0" onclick="speakFlash()">🔊 Listen</button><button class="secondary" onclick="flashMove(1)">→</button></div></div></div></section>

 <section id="games" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="show('home')">← Back</button><h2>Mini Games</h2><span></span></div><div class="grid">
  <button class="tile pink" onclick="openGame('ice')"><b>🍦</b>Ice Cream Builder</button><button class="tile green" onclick="openGame('bee')"><b>🐝</b>Bee Trace Map</button><button class="tile orange" onclick="openGame('monkey')"><b>🐒</b>Catch Bananas</button><button class="tile purple" onclick="openGame('puzzle')"><b>🧩</b>Puzzle Fun</button><button class="tile blue" onclick="openGame('shapeMatch')"><b>🔷</b>Shape Match</button><button class="tile red" onclick="openGame('colour')"><b>🎨</b>Colour Splash</button>
 </div></div></section>

 <section id="game" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="leaveGame()">← Games</button><h2 id="gameTitle">Game</h2><span></span></div><div class="gamebox" id="gameContent"></div></div></section>

 <section id="avatar" class="screen"><div class="card"><div class="headrow"><button class="secondary" onclick="show('home')">← Back</button><h2>My Avatar</h2><span></span></div>
  <div class="avatar-panel">
   <div class="gender-row"><button id="girlBtn" class="gender-btn" onclick="setGender('girl')">👧 Girl</button><button id="boyBtn" class="gender-btn" onclick="setGender('boy')">👦 Boy</button></div>
   <div class="avatar-stage" id="avatarStage"></div>
   <div class="tabs"><button class="tab active">All</button><button class="tab">Common</button><button class="tab">Rare</button><button class="tab">Epic</button></div>
   <div class="prof-grid" id="professionGrid"></div>
   <div class="avatar-actions"><button class="primary" onclick="saveAvatar()">💾 Save Avatar</button><button class="primary" style="background:linear-gradient(#ffd660,#e6a919);box-shadow:0 7px 0 #a56d08;color:#603700" onclick="randomAvatar()">🎲 Surprise Me</button></div>
  </div>
 </div></section>

 <section id="reward" class="screen"><div class="card"><div class="reward-box"><h2>Great job! 🎉</h2><div class="reward-avatar" id="rewardAvatar"></div><div style="font-size:65px">⭐⭐⭐</div><h3 id="rewardText">You earned rewards!</h3><button class="primary" onclick="show('home')">Back Home</button></div></div></section>
</div>

<nav class="bottomnav"><button onclick="show('home')"><b>🏠</b>Home</button><button onclick="show('learn')"><b>📚</b>Learn</button><button onclick="show('games')"><b>🎮</b>Games</button><button onclick="show('avatar')"><b>👧👦</b>Avatar</button><button onclick="parentLock()"><b>🔒</b>Parent</button></nav>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const defaults={coins:120,stars:0,gender:'girl',profession:'casual',unlocked:['casual','doctor','chef'],name:'Rara'};
let state;
try{state={...defaults,...JSON.parse(localStorage.getItem('smartMathRara3')||'{}')}}catch(e){state={...defaults}}
if(!Array.isArray(state.unlocked))state.unlocked=[...defaults.unlocked];

const professions=[
 {id:'casual',name:'Casual',icon:'💗',cost:0,tier:'Common'},
 {id:'doctor',name:'Doctor',icon:'🩺',cost:0,tier:'Common'},
 {id:'chef',name:'Chef',icon:'👩‍🍳',cost:0,tier:'Common'},
 {id:'pilot',name:'Pilot',icon:'✈️',cost:160,tier:'Rare'},
 {id:'teacher',name:'Teacher',icon:'📚',cost:140,tier:'Rare'},
 {id:'scientist',name:'Scientist',icon:'🔬',cost:180,tier:'Rare'},
 {id:'police',name:'Police',icon:'👮',cost:220,tier:'Epic'},
 {id:'firefighter',name:'Firefighter',icon:'🚒',cost:240,tier:'Epic'},
 {id:'astronaut',name:'Astronaut',icon:'🚀',cost:300,tier:'Epic'},
 {id:'engineer',name:'Engineer',icon:'🛠️',cost:250,tier:'Epic'},
 {id:'artist',name:'Artist',icon:'🎨',cost:120,tier:'Rare'},
 {id:'farmer',name:'Farmer',icon:'🌱',cost:100,tier:'Common'}
];

function save(){localStorage.setItem('smartMathRara3',JSON.stringify(state));updateStats()}
function updateStats(){$('#coins').textContent=state.coins;$('#stars').textContent=state.stars}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1700)}
function show(id){$$('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');if(id==='avatar')renderAvatarPage();window.scrollTo(0,0)}
function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.rate=.86;u.pitch=1.12;speechSynthesis.speak(u)}catch(e){}}
function reward(n=1){state.stars+=n;state.coins+=n*5;save();renderEverywhere();toast('Great job! ⭐ +'+n)}
function professionData(id){return professions.find(p=>p.id===id)||professions[0]}

function avatarSVG(gender=state.gender,profession=state.profession,mini=false){
 const girl=gender==='girl';
 const looks={
  casual:{top:girl?'#ec4899':'#3574d4',bottom:girl?'#7c3aed':'#274b99',badge:'R',hat:''},
  doctor:{top:'#ffffff',bottom:'#4c8cc7',badge:'✚',hat:''},
  chef:{top:'#fff6e8',bottom:'#d9d9e8',badge:'🍳',hat:'chef'},
  pilot:{top:'#203968',bottom:'#172b50',badge:'✈',hat:'pilot'},
  teacher:{top:girl?'#df7cae':'#4d79b8',bottom:'#42326f',badge:'A+',hat:''},
  scientist:{top:'#e9f7ff',bottom:'#4d83a8',badge:'⚗',hat:''},
  police:{top:'#244c86',bottom:'#172c51',badge:'★',hat:'police'},
  firefighter:{top:'#c43b35',bottom:'#68241f',badge:'🔥',hat:'fire'},
  astronaut:{top:'#f4f4f5',bottom:'#9ca3af',badge:'🚀',hat:'space'},
  engineer:{top:'#f0a928',bottom:'#4b5563',badge:'⚙',hat:'hard'},
  artist:{top:'#ec7e4a',bottom:'#445e86',badge:'🎨',hat:'beret'},
  farmer:{top:'#65a84a',bottom:'#7c4d2b',badge:'🌱',hat:'straw'}
 }[profession]||{top:'#ec4899',bottom:'#7c3aed',badge:'R',hat:''};
 const hair=girl?'#3b1f27':'#241b1b', skin='#f4c3a5';
 let headwear='';
 if(girl){
  headwear=`<path d="M116 165 Q90 68 210 36 Q330 68 304 165 L290 242 Q210 274 130 242Z" fill="#5a238f"/>
  <path d="M130 141 Q145 58 210 56 Q276 58 290 141 Q259 94 210 90 Q160 94 130 141" fill="#5a238f"/>`;
 }else{
  headwear=`<path d="M132 126 Q154 55 210 58 Q270 57 289 126 Q263 91 210 91 Q158 91 132 126Z" fill="${hair}"/>`;
 }
 const hats={
  chef:`<path d="M146 67 Q142 31 176 36 Q189 7 214 36 Q240 6 253 37 Q289 32 284 69Z" fill="#fff" stroke="#ddd" stroke-width="4"/>`,
  pilot:`<path d="M128 85 Q210 35 292 85 L281 112 Q210 89 139 112Z" fill="#172b50"/><path d="M148 91 Q210 73 272 91" stroke="#f4c44d" stroke-width="8"/>`,
  police:`<path d="M128 84 Q210 39 292 84 L282 111 Q210 91 138 111Z" fill="#1c3e72"/><circle cx="210" cy="80" r="13" fill="#f5c84b"/>`,
  fire:`<path d="M139 94 Q143 34 210 30 Q277 34 281 94Z" fill="#d6362d"/><rect x="130" y="88" width="160" height="25" rx="12" fill="#f2d34d"/>`,
  space:`<circle cx="210" cy="137" r="105" fill="#d9e7f4" opacity=".55" stroke="#fff" stroke-width="9"/>`,
  hard:`<path d="M131 95 Q141 37 210 35 Q279 37 289 95Z" fill="#f2b92f"/><rect x="124" y="90" width="172" height="21" rx="10" fill="#d89b17"/>`,
  beret:`<ellipse cx="201" cy="72" rx="78" ry="35" fill="#b8325d"/><circle cx="237" cy="44" r="10" fill="#b8325d"/>`,
  straw:`<ellipse cx="210" cy="91" rx="103" ry="27" fill="#d9a63f"/><path d="M149 88 Q157 35 210 36 Q264 35 272 88Z" fill="#edc56a"/>`
 }[looks.hat]||'';
 const faceY=145;
 return `<svg class="avatar-svg" viewBox="0 0 420 520" aria-label="${gender} ${profession} avatar">
 <ellipse cx="210" cy="498" rx="116" ry="17" fill="#4a236030"/>
 ${headwear}${hats}
 <circle cx="210" cy="${faceY}" r="79" fill="${skin}"/>
 <ellipse cx="177" cy="145" rx="13" ry="18" fill="#352139"/><ellipse cx="243" cy="145" rx="13" ry="18" fill="#352139"/><circle cx="181" cy="139" r="4" fill="#fff"/><circle cx="247" cy="139" r="4" fill="#fff"/>
 <path d="M181 183 Q210 208 240 183" fill="none" stroke="#b34c59" stroke-width="7" stroke-linecap="round"/><circle cx="157" cy="173" r="12" fill="#ef9d9d66"/><circle cx="263" cy="173" r="12" fill="#ef9d9d66"/>
 <path d="M137 237 Q210 214 283 237 L303 405 Q210 448 117 405Z" fill="${looks.top}"/><path d="M143 365 Q210 390 277 365 L291 432 Q210 460 129 432Z" fill="${looks.bottom}"/>
 <circle cx="210" cy="319" r="28" fill="#ffffffbb"/><text x="210" y="329" text-anchor="middle" font-size="27" font-weight="900" fill="#642b82">${looks.badge}</text>
 <path d="M144 268 Q89 300 76 349" fill="none" stroke="${skin}" stroke-width="34" stroke-linecap="round"/>
 <g class="wave"><path d="M276 268 Q337 237 338 179" fill="none" stroke="${skin}" stroke-width="34" stroke-linecap="round"/><circle cx="338" cy="165" r="22" fill="${skin}"/></g>
 <path d="M157 422 L151 481" stroke="${looks.bottom}" stroke-width="42" stroke-linecap="round"/><path d="M263 422 L269 481" stroke="${looks.bottom}" stroke-width="42" stroke-linecap="round"/>
 <ellipse cx="141" cy="487" rx="42" ry="19" fill="#fff"/><ellipse cx="279" cy="487" rx="42" ry="19" fill="#fff"/>
 </svg>`;
}

function renderEverywhere(){
 $('#homeAvatar').innerHTML=avatarSVG();
 $('#lessonAvatar').innerHTML=avatarSVG(state.gender,state.profession,true);
 $('#rewardAvatar').innerHTML=avatarSVG();
 $('#homeGreeting').innerHTML=`Hi ${state.name}! 💜<br>Ready to learn and have fun?`;
 updateStats()
}
function renderAvatarPage(){
 $('#girlBtn').classList.toggle('active',state.gender==='girl');$('#boyBtn').classList.toggle('active',state.gender==='boy');
 $('#avatarStage').innerHTML=avatarSVG();
 $('#professionGrid').innerHTML=professions.map(p=>{
   const unlocked=state.unlocked.includes(p.id),active=state.profession===p.id;
   return `<button class="prof-card ${active?'active':''}" onclick="chooseProfession('${p.id}')">
    ${unlocked?'':`<span class="lock">🔒 ${p.cost}</span>`}
    <div class="mini-avatar">${avatarSVG(state.gender,p.id,true)}</div>
    <div>${p.name}</div><div class="cost">${unlocked?p.tier:'🪙 '+p.cost}</div>
   </button>`
 }).join('')
}
function setGender(g){state.gender=g;save();renderEverywhere();renderAvatarPage();toast(g==='girl'?'Girl avatar selected 👧':'Boy avatar selected 👦')}
function chooseProfession(id){
 const p=professionData(id);
 if(!state.unlocked.includes(id)){
  if(state.coins<p.cost){toast(`Need ${p.cost-state.coins} more coins 🔒`);return}
  if(!confirm(`Unlock ${p.name} for ${p.cost} coins?`))return;
  state.coins-=p.cost;state.unlocked.push(id);toast(`${p.name} unlocked! 🎉`)
 }
 state.profession=id;save();renderEverywhere();renderAvatarPage();speak(`${p.name} outfit selected`)
}
function saveAvatar(){save();renderEverywhere();toast('Avatar saved on this device 💾');show('home')}
function randomAvatar(){const unlocked=professions.filter(p=>state.unlocked.includes(p.id));state.gender=Math.random()>.5?'girl':'boy';state.profession=unlocked[Math.floor(Math.random()*unlocked.length)].id;save();renderEverywhere();renderAvatarPage();toast('Surprise avatar ready! 🎲')}

function dailyReward(){const d=new Date().toDateString();if(state.rewardDay===d){toast('Reward already collected today 💜');return}state.rewardDay=d;state.coins+=25;state.stars+=2;save();renderEverywhere();$('#rewardText').textContent='Daily reward: 25 coins + 2 stars!';show('reward')}

let quizMode='count';
function startQuiz(m){quizMode=m;show('quiz');newQuestion()}
function newQuestion(){
 let a=1+Math.floor(Math.random()*5),b=1+Math.floor(Math.random()*5),q='',visual='',ans,opts;
 if(quizMode==='count'){ans=a;q='How many stars?';visual='⭐'.repeat(a);opts=[ans,ans+1,Math.max(0,ans-1)]}
 if(quizMode==='add'){ans=a+b;q=`What is ${a} + ${b}?`;visual='🍎'.repeat(a)+' + '+'🍎'.repeat(b);opts=[ans,ans+1,Math.max(0,ans-1)]}
 if(quizMode==='sub'){if(b>a)[a,b]=[b,a];ans=a-b;q=`What is ${a} − ${b}?`;visual='🧸'.repeat(a);opts=[ans,ans+1,Math.max(0,ans-1)]}
 if(quizMode==='shape'){const arr=[['Circle','●'],['Triangle','▲'],['Square','■'],['Star','★']][Math.floor(Math.random()*4)];ans=arr[0];q='What shape is this?';visual=arr[1];opts=shuffle(['Circle','Triangle','Square','Star']).slice(0,3);if(!opts.includes(ans))opts[0]=ans}
 $('#question').textContent=q;$('#visual').textContent=visual;$('#quizFeedback').textContent='';$('#answers').innerHTML=shuffle(opts).map(x=>`<button class="choice" onclick='checkQuiz(${JSON.stringify(x)},${JSON.stringify(ans)})'>${x}</button>`).join('')
}
function checkQuiz(x,ans){if(x===ans){$('#quizFeedback').textContent='✅ Great job!';reward();setTimeout(newQuestion,800)}else{$('#quizFeedback').textContent='Try again, love 💜';speak('Try again')}}
let flash=1;
function flashMove(n){flash=Math.min(10,Math.max(1,flash+n));$('#flashNum').textContent=flash;$('#flashObjects').textContent='⭐'.repeat(flash)}
function speakFlash(){speak(String(flash))}

let currentGame=null,monkeyTimer=null,traceIndex=0,puzzleArr=[],selectedShape=null,matched=0;
function openGame(g){currentGame=g;show('game');const titles={ice:'Ice Cream Builder',bee:'Bee Trace Map',monkey:'Catch the Bananas',puzzle:'Puzzle Fun',shapeMatch:'Shape Match',colour:'Colour Splash'};$('#gameTitle').textContent=titles[g];({ice:initIce,bee:initBee,monkey:initMonkey,puzzle:initPuzzle,shapeMatch:initShapeMatch,colour:initColour}[g])()}
function leaveGame(){if(monkeyTimer)clearInterval(monkeyTimer);monkeyTimer=null;show('games')}
const colours=[['Red','#ef4444'],['Blue','#3b82f6'],['Green','#22c55e'],['Yellow','#d7ad00'],['Purple','#8b5cf6'],['Pink','#ec4899']];
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function initIce(){const target=colours[Math.floor(Math.random()*colours.length)],others=shuffle(colours.filter(c=>c[0]!==target[0])).slice(0,4),opts=shuffle([target,...others]);$('#gameContent').innerHTML=`<div class="instruction">Make a <b>${target[0]}</b> ice cream!</div><div class="ice-stage"><div class="scoop" id="scoop"></div><div class="cone"></div></div><div class="choice-grid">${opts.map(c=>`<button class="color-btn" style="background:${c[1]}" onclick="pickIce('${c[0]}','${c[1]}','${target[0]}')">${c[0]}</button>`).join('')}</div><div class="feedback" id="gameFeedback"></div>`}
function pickIce(name,hex,target){$('#scoop').style.background=hex;if(name===target){$('#gameFeedback').textContent='✅ Perfect ice cream!';reward();setTimeout(initIce,850)}else{$('#gameFeedback').textContent=`That is ${name}. Try ${target}!`}}

function initBee(){traceIndex=0;const pts=[[8,80],[18,62],[28,72],[38,50],[49,62],[60,42],[71,54],[82,35],[93,24]];$('#gameContent').innerHTML=`<div class="instruction">Trace the dots in order to help Bee reach the flower.</div><div class="trace-area" id="traceArea"><div class="bee" id="bee" style="left:${pts[0][0]}%;top:${pts[0][1]}%">🐝</div>${pts.map((p,i)=>`<div class="trace-dot" data-i="${i}" style="left:${p[0]}%;top:${p[1]}%;${i===0?'background:#f59e0b':''}"></div>`).join('')}<div class="flower">🌸</div></div><div class="feedback" id="gameFeedback">Start at the orange dot.</div>`;const area=$('#traceArea');const move=e=>{e.preventDefault?.();const t=e.touches?e.touches[0]:e,d=$$('.trace-dot')[traceIndex];if(!d)return;const dr=d.getBoundingClientRect(),dx=t.clientX-(dr.left+dr.width/2),dy=t.clientY-(dr.top+dr.height/2);if(Math.hypot(dx,dy)<38){d.style.background='#22c55e';traceIndex++;$('#bee').style.left=d.style.left;$('#bee').style.top=d.style.top;if(traceIndex===$$('.trace-dot').length){$('#gameFeedback').textContent='🌸 Bee found the flower!';reward(2)}}};area.addEventListener('pointerdown',move);area.addEventListener('pointermove',move);area.addEventListener('touchmove',move,{passive:false})}

function initMonkey(){let score=0,time=20;$('#gameContent').innerHTML=`<div class="instruction">Drag the monkey and catch as many bananas as possible!</div><div class="scorebig">🍌 <span id="mScore">0</span> &nbsp; ⏱️ <span id="mTime">20</span>s</div><div class="monkey-stage" id="monkeyStage"><div class="monkey" id="monkey">🐒</div></div>`;const st=$('#monkeyStage'),mon=$('#monkey');const move=e=>{e.preventDefault?.();const r=st.getBoundingClientRect(),t=e.touches?e.touches[0]:e,x=Math.max(35,Math.min(r.width-35,t.clientX-r.left));mon.style.left=x+'px'};st.addEventListener('pointerdown',move);st.addEventListener('pointermove',move);st.addEventListener('touchmove',move,{passive:false});const drop=()=>{const b=document.createElement('div');b.className='banana';b.textContent='🍌';b.style.left=(10+Math.random()*80)+'%';st.appendChild(b);let y=-45;const fall=setInterval(()=>{y+=6;b.style.top=y+'px';const br=b.getBoundingClientRect(),mr=mon.getBoundingClientRect();if(br.bottom>mr.top&&br.left<mr.right&&br.right>mr.left){score++;$('#mScore').textContent=score;clearInterval(fall);b.remove()}else if(y>st.clientHeight){clearInterval(fall);b.remove()}},35)};monkeyTimer=setInterval(()=>{drop();time--;$('#mTime').textContent=time;if(time<=0){clearInterval(monkeyTimer);monkeyTimer=null;$('#rewardText').textContent=`You caught ${score} bananas!`;reward(Math.max(1,Math.floor(score/3)));setTimeout(()=>show('reward'),500)}},700)}

function initPuzzle(){puzzleArr=[1,2,3,4,5,6,7,8,0];for(let i=0;i<80;i++){const z=puzzleArr.indexOf(0),moves=[z-3,z+3,z%3?z-1:-1,z%3<2?z+1:-1].filter(x=>x>=0&&x<9),m=moves[Math.floor(Math.random()*moves.length)];[puzzleArr[z],puzzleArr[m]]=[puzzleArr[m],puzzleArr[z]]}renderPuzzle()}
function renderPuzzle(){$('#gameContent').innerHTML=`<div class="instruction">Slide the pieces into order: 1 → 8.</div><div class="puzzle">${puzzleArr.map((n,i)=>`<button class="piece ${n===0?'empty':''}" onclick="movePiece(${i})">${n||''}</button>`).join('')}</div><div class="feedback">Tap a piece beside the empty space.</div>`}
function movePiece(i){const z=puzzleArr.indexOf(0),valid=[z-3,z+3,z%3?z-1:-1,z%3<2?z+1:-1];if(valid.includes(i)){[puzzleArr[z],puzzleArr[i]]=[puzzleArr[i],puzzleArr[z]];renderPuzzle();if(puzzleArr.join()==='1,2,3,4,5,6,7,8,0'){toast('Puzzle completed! 🧩');reward(3)}}}

function initShapeMatch(){selectedShape=null;matched=0;const shapes=['●','▲','■','★'],left=shuffle(shapes),right=shuffle(shapes);$('#gameContent').innerHTML=`<div class="instruction">Tap the same shape on both sides.</div><div class="match-board"><div class="match-col">${left.map(s=>`<button class="match-card" data-shape="${s}" data-side="L" onclick="shapePick(this)">${s}</button>`).join('')}</div><div class="match-col">${right.map(s=>`<button class="match-card" data-shape="${s}" data-side="R" onclick="shapePick(this)">${s}</button>`).join('')}</div></div><div class="feedback" id="gameFeedback"></div>`}
function shapePick(el){if(el.classList.contains('done'))return;if(!selectedShape){selectedShape=el;el.classList.add('selected');return}if(selectedShape.dataset.side===el.dataset.side){selectedShape.classList.remove('selected');selectedShape=el;el.classList.add('selected');return}if(selectedShape.dataset.shape===el.dataset.shape){selectedShape.classList.remove('selected');selectedShape.classList.add('done');el.classList.add('done');matched++;$('#gameFeedback').textContent='✅ Same shape!';selectedShape=null;if(matched===4){reward(2);setTimeout(initShapeMatch,850)}}else{$('#gameFeedback').textContent='Different shapes. Try again!';selectedShape.classList.remove('selected');selectedShape=null}}

function initColour(){const target=colours[Math.floor(Math.random()*colours.length)],distractors=shuffle(colours.filter(c=>c[0]!==target[0])).slice(0,3),opts=shuffle([target,...distractors]);$('#gameContent').innerHTML=`<div class="instruction">Find the <b>${target[0]}</b> colour. Tap the matching splash!</div><div class="splash-board">${opts.map(c=>`<button class="splash-card" style="background:${c[1]}" onclick="colourPick('${c[0]}','${target[0]}')">${c[0]}</button>`).join('')}</div><div class="feedback" id="gameFeedback"></div>`}
function colourPick(c,t){if(c===t){$('#gameFeedback').textContent='✅ Correct colour!';reward();setTimeout(initColour,800)}else{$('#gameFeedback').textContent=`That is ${c}. Find ${t}!`}}

function parentLock(){const x=prompt('Parent lock: What is 7 + 2?');if(x==='9')alert(`Parent area unlocked.\nStars: ${state.stars}\nCoins: ${state.coins}\nUnlocked outfits: ${state.unlocked.length}/${professions.length}\nProgress is saved on this device.`);else if(x!==null)toast('Incorrect answer')}
renderEverywhere();renderAvatarPage();flashMove(0);
</script>
</body></html>
